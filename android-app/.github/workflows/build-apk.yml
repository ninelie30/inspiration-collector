name: 构建 APK 并发布

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android-app/**'
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # 发布 Release 所需

    steps:
      - uses: actions/checkout@v4

      - name: 设置 Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 设置 Android SDK
        uses: android-actions/setup-android@v3

      - name: 生成 Gradle Wrapper
        run: |
          cd android-app
          gradle wrapper --gradle-version=8.5

      - name: 构建 Debug APK
        run: |
          cd android-app
          ./gradlew assembleDebug --stacktrace

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          name: "灵感收藏家 Android APK"
          tag_name: "android-latest"
          body: "自动构建的最新 Android APK 安装包。\n\n下载 `app-debug.apk` 即可安装。"
          files: android-app/app/build/outputs/apk/debug/app-debug.apk
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
